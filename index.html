<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaultChat E2EE - Secure Messenger</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        :root { --primary: #007aff; --success: #34c759; --danger: #ff3b30; --bg: #121212; --panel: #1e1e1e; --border: #333; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: white; padding: 20px; margin: 0; line-height: 1.5; }
        .container { max-width: 600px; margin: 0 auto; }
        .hidden { display: none !important; }
        
        /* UI Elements */
        input { background: #2b2b2b; color: white; border: 1px solid var(--border); padding: 12px; width: calc(100% - 26px); margin-bottom: 10px; border-radius: 10px; outline: none; transition: border 0.2s; }
        input:focus { border-color: var(--primary); }
        button { padding: 12px; cursor: pointer; border-radius: 10px; border: none; font-weight: bold; transition: 0.2s; opacity: 1; }
        button:active { opacity: 0.7; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        
        /* Chat Layout */
        #chat-box { height: 500px; border: 1px solid var(--border); overflow-y: auto; background: var(--panel); padding: 15px; margin-bottom: 10px; border-radius: 15px; display: flex; flex-direction: column; gap: 8px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 12px; border-radius: 12px; margin-bottom: 10px; }
        .timer { color: var(--danger); font-weight: bold; font-size: 0.85em; }
        
        /* Message Styles */
        .msg-unit { margin-bottom: 5px; word-break: break-all; }
        .sender-name { font-weight: bold; color: #aaa; font-size: 0.9em; margin-right: 5px; }
        .img-msg { max-width: 250px; border-radius: 10px; margin-top: 5px; border: 1px solid var(--border); cursor: pointer; }
        .file-link { background: #333; padding: 8px 12px; border-radius: 8px; display: inline-block; color: var(--success); text-decoration: none; font-size: 0.9em; margin-top: 5px; }
        
        /* Admin Panel */
        .admin-panel { background: #1a1a1a; border: 1px solid #444; padding: 20px; border-radius: 15px; margin-top: 10px; }
        .room-item { background: #252525; padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .notice-area { margin-top: 20px; border-top: 1px solid #333; padding-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="auth-section">
            <h2 style="text-align: center; margin-bottom: 30px;">🔐 VaultChat</h2>
            <input type="text" id="room-name" placeholder="방 이름">
            <button class="btn-primary" onclick="createRoom()">새 방 만들기 (방장)</button>
            <div style="margin: 20px 0; text-align: center; color: #555;">───── OR ─────</div>
            <input type="text" id="otp-input" placeholder="OTP 코드 6자리">
            <button class="btn-primary" style="background: var(--success);" onclick="joinRoom()">방 입장하기</button>
        </div>

        <div id="admin-section" class="hidden">
            <h2>🛠️ 시스템 관리 도구</h2>
            <div class="admin-panel">
                <div id="admin-room-list">활성화된 방 데이터를 불러오는 중...</div>
                
                <div class="notice-area">
                    <strong style="color: var(--primary);">📢 전역 공지 발송</strong>
                    <input type="text" id="admin-notice-input" placeholder="모든 유저에게 보낼 메시지" style="margin-top:10px;">
                    <button class="btn-primary" onclick="sendGlobalNotice()">공지 발송하기</button>
                </div>
            </div>
            <button class="btn-primary" style="background: #444; margin-top: 20px;" onclick="location.reload()">로그아웃</button>
        </div>

        <div id="nickname-section" class="hidden">
            <h3>대화명 설정</h3>
            <p style="font-size: 0.9em; color: #888;">이 방에서 사용할 이름을 입력하세요.</p>
            <input type="text" id="user-nickname" placeholder="닉네임 입력">
            <button class="btn-primary" onclick="setNickname()">대화 시작하기</button>
        </div>

        <div id="chat-section" class="hidden">
            <div class="header">
                <div>
                    <span id="current-room-title" style="font-weight:bold;"></span>
                    <span id="chat-otp-display" style="color: var(--primary); margin-left: 10px; font-family: monospace;">CODE: ------</span>
                    <span id="chat-timer" class="timer"></span>
                </div>
                <div>
                    <button style="background:#444; color:white; font-size:0.75em; padding: 5px 10px;" onclick="refreshOTP()">갱신</button>
                    <button style="background: var(--danger); color:white; font-size:0.75em; padding: 5px 10px;" onclick="leaveRoom()">나가기</button>
                </div>
            </div>
            <div id="chat-box"></div>
            <div style="display:flex; gap:8px; align-items: center;">
                <input type="file" id="file-input" class="hidden" onchange="processFile()">
                <button style="background:#333; color:white; width:45px; height:45px; font-size: 1.5em; display: flex; align-items: center; justify-content: center;" onclick="document.getElementById('file-input').click()">+</button>
                <input type="text" id="msg-input" placeholder="메시지를 입력하세요..." style="margin-bottom:0; flex:1;" onkeypress="if(event.keyCode==13) sendMessage()">
                <button class="btn-primary" style="width:70px; height:45px;" onclick="sendMessage()">전송</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io("https://massenger-9oh6.onrender.com");
        const E2EE_KEY = CryptoJS.enc.Utf8.parse('1234567890123456');
        const E2EE_IV = CryptoJS.enc.Utf8.parse('1234567890123456');
        
        let currentRoom = "";
        let timerInterval = null;

        /* --- 관리자 기능 --- */
        socket.on('admin_auth_success', (data) => {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('admin-section').classList.remove('hidden');
            updateAdminRoomList(data.rooms);
        });

        function updateAdminRoomList(rooms) {
            const listDiv = document.getElementById('admin-room-list');
            if (!rooms || rooms.length === 0) {
                listDiv.innerHTML = "<p style='color:#666;'>현재 개설된 방이 없습니다.</p>";
                return;
            }
            listDiv.innerHTML = "<strong>현재 활성 방 목록</strong>";
            rooms.forEach(room => {
                const item = document.createElement('div');
                item.className = 'room-item';
                item.innerHTML = `
                    <span>🏠 ${room.name} (${room.count}명)</span>
                    <button style="background:var(--danger); padding:5px 10px; font-size:0.8em;" onclick="deleteRoom('${room.name}')">폐쇄</button>
                `;
                listDiv.appendChild(item);
            });
        }

        function deleteRoom(name) {
            if(confirm(`'${name}' 방을 강제 폐쇄하시겠습니까?`)) {
                socket.emit('delete_room_admin', {target_room: name});
            }
        }

        function sendGlobalNotice() {
            const msg = document.getElementById('admin-notice-input').value;
            if(!msg) return;
            // 서버에 전체 공지 이벤트 전송 (백엔드에 global_notice 이벤트가 구현되어 있어야 함)
            socket.emit('send_global_notice', { msg: msg });
            document.getElementById('admin-notice-input').value = "";
            alert("전체 공지가 발송되었습니다.");
        }

        socket.on('global_notice', (data) => {
            alert("📢 [시스템 공지]\n\n" + data.msg);
            const box = document.getElementById('chat-box');
            box.innerHTML += `<div style="text-align:center; background:#332200; color:#ffcc00; padding:10px; border-radius:8px; margin:10px 0; font-size:0.9em;">⚠️ 시스템 공지: ${data.msg}</div>`;
            box.scrollTop = box.scrollHeight;
        });

        /* --- 대화방 입장 및 생성 --- */
        function createRoom() {
            const r = document.getElementById('room-name').value;
            if(r) socket.emit('create_room', {room: r});
        }

        function joinRoom() {
            const r = document.getElementById('room-name').value;
            const c = document.getElementById('otp-input').value;
            if(r && c) socket.emit('join_with_otp', {room: r, code: c});
        }

        socket.on('join_success', (data) => {
            currentRoom = data.room;
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('nickname-section').classList.remove('hidden');
        });

        function setNickname() {
            const n = document.getElementById('user-nickname').value.trim();
            if(n) socket.emit('set_nickname', {nickname: n, room: currentRoom});
        }

        socket.on('nickname_success', () => {
            document.getElementById('nickname-section').classList.add('hidden');
            document.getElementById('chat-section').classList.remove('hidden');
            document.getElementById('current-room-title').innerText = currentRoom;
        });

        /* --- OTP 동기화 및 타이머 --- */
        socket.on('display_otp', (data) => {
            const otpText = document.getElementById('chat-otp-display');
            const timerText = document.getElementById('chat-timer');
            otpText.innerText = `CODE: ${data.code}`;
            let timeLeft = data.time_left || 60;

            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                timerText.innerText = `(${timeLeft}s)`;
                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    otpText.innerText = "CODE: ------";
                    timerText.innerText = "(만료)";
                }
            }, 1000);
        });

        function refreshOTP() {
            socket.emit('refresh_otp', {room: currentRoom});
        }

        /* --- 메시징 및 파일 전송 --- */
        function sendMessage() {
            const input = document.getElementById('msg-input');
            if(!input.value) return;
            const encrypted = CryptoJS.AES.encrypt(input.value, E2EE_KEY, { iv: E2EE_IV }).toString();
            socket.emit('send_secure_msg', {msg: encrypted, type: 'text'});
            input.value = ""; 
        }

        socket.on('receive_secure_msg', (data) => {
            const myNick = document.getElementById('user-nickname').value;
            const name = (data.sender === myNick) ? `나(${data.sender})` : data.sender;
            if (data.type === 'file') {
                addFileMsg(name, data.msg, data.fileName, data.fileType);
            } else {
                const decrypted = CryptoJS.AES.decrypt(data.msg, E2EE_KEY, { iv: E2EE_IV }).toString(CryptoJS.enc.Utf8);
                addMsg(name, decrypted);
            }
        });

        function processFile() {
            const file = document.getElementById('file-input').files[0];
            if (!file || file.size > 2 * 1024 * 1024) return alert("2MB 이하 파일만 가능합니다.");
            const reader = new FileReader();
            reader.onload = (e) => {
                socket.emit('send_secure_msg', {msg: e.target.result, type: 'file', fileName: file.name, fileType: file.type });
            };
            reader.readAsDataURL(file);
        }

        /* --- UI 유틸리티 --- */
        function addMsg(s, t) {
            const box = document.getElementById('chat-box');
            box.innerHTML += `<div class="msg-unit"><span class="sender-name">${s}:</span><span>${t}</span></div>`;
            box.scrollTop = box.scrollHeight;
        }

        function addFileMsg(s, data, fileName, fileType) {
            const box = document.getElementById('chat-box');
            const content = fileType.startsWith('image/') 
                ? `<img src="${data}" class="img-msg" onclick="window.open('${data}')">` 
                : `<a href="${data}" download="${fileName}" class="file-link">📎 ${fileName} (다운로드)</a>`;
            box.innerHTML += `<div class="msg-unit"><span class="sender-name">${s}:</span><br>${content}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        function leaveRoom() { if(confirm("방에서 퇴장하시겠습니까?")) location.reload(); }
        
        socket.on('notification', (data) => {
            const box = document.getElementById('chat-box');
            box.innerHTML += `<div style="text-align:center; color:#666; font-size:0.8em; margin:5px 0;">${data.msg}</div>`;
            box.scrollTop = box.scrollHeight;
        });

        socket.on('room_closed', (data) => { alert(data.msg); location.reload(); });
        socket.on('nickname_fail', (data) => alert(data.msg));
        socket.on('join_fail', (data) => alert(data.msg));
    </script>
</body>
</html>
