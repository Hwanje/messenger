<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaultChat E2EE</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; }
        .hidden { display: none !important; }
        input { background: #2b2b2b; color: white; border: 1px solid #444; padding: 12px; width: calc(100% - 26px); margin-bottom: 10px; border-radius: 6px; }
        button { padding: 12px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; }
        .btn-primary { background: #007aff; color: white; width: 100%; }
        #chat-box { height: 400px; border: 1px solid #333; overflow-y: auto; background: #1e1e1e; padding: 15px; margin-bottom: 10px; border-radius: 10px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .timer { color: #ff3b30; font-size: 0.8em; margin-left: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="auth-section">
            <h2>🔐 VaultChat</h2>
            <input type="text" id="room-name" placeholder="방 이름">
            <button class="btn-primary" onclick="createRoom()">새 방 만들기 (방장)</button>
            <div id="otp-area" class="hidden" style="text-align:center; margin:15px; border: 1px dashed #555; padding: 15px;">
                <span id="otp-display" style="color:#007aff; font-size:1.5em; font-weight:bold;"></span>
                <p id="auth-timer" class="timer"></p>
            </div>
            <hr style="border:0.5px solid #333; margin:20px 0;">
            <input type="text" id="otp-input" placeholder="초대코드">
            <button class="btn-primary" style="background:#34c759;" onclick="joinRoom()">방 입장하기</button>
        </div>

        <div id="nickname-section" class="hidden">
            <h3>사용할 닉네임</h3>
            <input type="text" id="user-nickname" placeholder="닉네임 입력">
            <button class="btn-primary" onclick="setNickname()">대화 시작</button>
        </div>

        <div id="chat-section" class="hidden">
            <div class="header">
                <div>
                    <span id="current-room-title" style="font-weight:bold;"></span>
                    <span id="chat-otp-display" style="color:#007aff; margin-left:10px; font-size:0.9em;"></span>
                    <span id="chat-timer" class="timer"></span>
                </div>
                <div>
                    <button style="background:#444; color:white; font-size:0.7em;" onclick="refreshOTP()">갱신</button>
                    <button style="background:#ff3b30; color:white; font-size:0.7em;" onclick="leaveRoom()">나가기</button>
                </div>
            </div>
            <div id="chat-box"></div>
            <div style="display:flex; gap:5px;">
                <input type="text" id="msg-input" placeholder="비밀 메시지..." style="margin-bottom:0;">
                <button class="btn-primary" style="width:70px;" onclick="sendMessage()">전송</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io("https://massenger-9oh6.onrender.com");
        const E2EE_KEY = CryptoJS.enc.Utf8.parse('1234567890123456');
        const E2EE_IV = CryptoJS.enc.Utf8.parse('1234567890123456');
        let currentRoom = "";
        let timeLeft = 60;
        let timerInterval = null;

        // 타이머 시작 함수
        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = 60;
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('auth-timer').innerText = "만료됨 (갱신 필요)";
                    document.getElementById('chat-timer').innerText = "(만료)";
                } else {
                    updateTimerDisplay();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const text = `${timeLeft}초 남음`;
            document.getElementById('auth-timer').innerText = text;
            document.getElementById('chat-timer').innerText = `(${timeLeft}s)`;
        }

        socket.on('display_otp', (data) => {
            document.getElementById('otp-area').classList.remove('hidden');
            document.getElementById('otp-display').innerText = data.code;
            document.getElementById('chat-otp-display').innerText = `CODE: ${data.code}`;
            startTimer(); // 코드를 받으면 타이머 시작
        });

        function createRoom() {
            const room = document.getElementById('room-name').value;
            if(!room) return alert("방 이름을 입력하세요.");
            socket.emit('create_room', {room: room});
        }

        function joinRoom() {
            const room = document.getElementById('room-name').value;
            const code = document.getElementById('otp-input').value;
            socket.emit('join_with_otp', {room: room, code: code});
        }

        socket.on('join_success', (data) => {
            currentRoom = data.room;
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('nickname-section').classList.remove('hidden');
        });

        function setNickname() {
            const nick = document.getElementById('user-nickname').value;
            if(!nick) return alert("닉네임 입력!");
            socket.emit('set_nickname', {nickname: nick, room: currentRoom});
            document.getElementById('nickname-section').classList.add('hidden');
            document.getElementById('chat-section').classList.remove('hidden');
            document.getElementById('current-room-title').innerText = currentRoom;
        }

        function sendMessage() {
            const text = document.getElementById('msg-input').value;
            if(!text || !currentRoom) return;
            
            const encrypted = CryptoJS.AES.encrypt(text, E2EE_KEY, { iv: E2EE_IV }).toString();
            // 핵심: room 정보를 함께 보내야 상대방에게 배달됨
            socket.emit('send_secure_msg', {room: currentRoom, msg: encrypted});
            
            addMsg("나", text);
            document.getElementById('msg-input').value = "";
        }

        socket.on('receive_secure_msg', (data) => {
            try {
                const decrypted = CryptoJS.AES.decrypt(data.msg, E2EE_KEY, { iv: E2EE_IV }).toString(CryptoJS.enc.Utf8);
                if(decrypted) addMsg(data.sender, decrypted);
            } catch(e) { console.error("복호화 실패", e); }
        });

        function addMsg(s, t) {
            const box = document.getElementById('chat-box');
            box.innerHTML += `<div><strong>${s}:</strong> ${t}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        function refreshOTP() { socket.emit('refresh_otp', {room: currentRoom}); }
        function leaveRoom() { location.reload(); }
        socket.on('notification', (data) => {
            document.getElementById('chat-box').innerHTML += `<div style="text-align:center;color:gray;font-size:0.8em;">${data.msg}</div>`;
        });
        socket.on('join_fail', (data) => alert(data.msg));
    </script>
</body>
</html>
