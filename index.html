<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaultChat E2EE</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; }
        .hidden { display: none !important; }
        input { background: #2b2b2b; color: white; border: 1px solid #444; padding: 12px; width: calc(100% - 26px); margin-bottom: 10px; border-radius: 6px; }
        button { padding: 12px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; }
        .btn-primary { background: #007aff; color: white; width: 100%; }
        .btn-sub { background: #333; color: #aaa; margin-top: 5px; width: 100%; }
        .btn-danger { background: #ff3b30; color: white; padding: 5px 10px; }
        #chat-box { height: 450px; border: 1px solid #333; overflow-y: auto; background: #1e1e1e; padding: 15px; margin-bottom: 10px; border-radius: 10px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: #222; padding: 10px; border-radius: 8px; }
        .msg-line { margin-bottom: 10px; line-height: 1.4; }
        .sender-name { color: #007aff; font-weight: bold; margin-right: 8px; }
        .enc-tag { font-size: 0.7em; color: #00ff00; opacity: 0.5; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div id="auth-section">
            <h2>🔐 VaultChat 입장</h2>
            <input type="text" id="user-nickname" placeholder="사용할 닉네임">
            <input type="text" id="room-name" placeholder="방 이름 (예: secret123)">
            <button class="btn-primary" onclick="createRoom()">새 방 만들기 (방장)</button>
            
            <div id="otp-area" class="hidden" style="text-align:center; margin:15px; border: 1px dashed #555; padding: 15px;">
                <span id="otp-display" style="color:#007aff; font-size:1.5em; font-weight:bold;"></span>
                <p style="font-size:0.8em; color:gray; margin-top:5px;">초대코드를 친구에게 공유하세요.</p>
            </div>
            
            <hr style="border:0.5px solid #333; margin:20px 0;">
            <input type="text" id="otp-input" placeholder="초대코드 6자리">
            <button class="btn-primary" style="background:#34c759;" onclick="joinRoom()">방 입장하기 (참가자)</button>
        </div>

        <div id="chat-section" class="hidden">
            <div class="header">
                <div>
                    <span id="current-room-name" style="font-weight:bold;"></span>
                    <button class="btn-sub" style="width:auto; margin-left:10px;" onclick="refreshOTP()">코드 갱신</button>
                </div>
                <button class="btn-danger" onclick="leaveRoom()">나가기</button>
            </div>
            <div id="chat-box"></div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="msg-input" placeholder="비밀 메시지..." style="margin-bottom:0;">
                <button class="btn-primary" style="width:80px;" onclick="sendMessage()">전송</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io("https://massenger-9oh6.onrender.com");
        const E2EE_KEY = CryptoJS.enc.Utf8.parse('1234567890123456');
        const E2EE_IV = CryptoJS.enc.Utf8.parse('1234567890123456');
        let currentRoom = "";

        function createRoom() {
            const room = document.getElementById('room-name').value;
            const nickname = document.getElementById('user-nickname').value;
            if(!room || !nickname) return alert("닉네임과 방 이름을 입력하세요.");
            socket.emit('create_room', {room: room, nickname: nickname});
        }

        function joinRoom() {
            const room = document.getElementById('room-name').value;
            const code = document.getElementById('otp-input').value;
            const nickname = document.getElementById('user-nickname').value;
            if(!room || !nickname || !code) return alert("모든 정보를 입력하세요.");
            socket.emit('join_with_otp', {room: room, code: code, nickname: nickname});
        }

        function refreshOTP() {
            socket.emit('refresh_otp', {room: currentRoom});
        }

        function leaveRoom() {
            if(confirm("방에서 나가시겠습니까?")) {
                socket.emit('leave_room', {room: currentRoom});
            }
        }

        socket.on('display_otp', (data) => {
            document.getElementById('otp-area').classList.remove('hidden');
            document.getElementById('otp-display').innerText = data.code;
        });

        socket.on('join_success', (data) => {
            currentRoom = data.room;
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('chat-section').classList.remove('hidden');
            document.getElementById('current-room-name').innerText = `방: ${currentRoom}`;
        });

        socket.on('join_fail', (data) => alert(data.msg));
        socket.on('leave_success', () => location.reload());

        function sendMessage() {
            const text = document.getElementById('msg-input').value;
            if(!text) return;
            const encrypted = CryptoJS.AES.encrypt(text, E2EE_KEY, { iv: E2EE_IV }).toString();
            socket.emit('send_secure_msg', {room: currentRoom, msg: encrypted});
            addMessage("나", text, encrypted);
            document.getElementById('msg-input').value = "";
        }

        socket.on('receive_secure_msg', (data) => {
            const decrypted = CryptoJS.AES.decrypt(data.msg, E2EE_KEY, { iv: E2EE_IV }).toString(CryptoJS.enc.Utf8);
            addMessage(data.sender, decrypted, data.msg);
        });

        function addMessage(sender, text, raw) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = 'msg-line';
            div.innerHTML = `<span class="sender-name">${sender}</span> ${text} <span class="enc-tag">[ENC]: ${raw.substring(0,15)}...</span>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        socket.on('notification', (data) => {
            const box = document.getElementById('chat-box');
            box.innerHTML += `<div style="text-align:center; color:gray; font-size:0.8em; margin:10px 0;">${data.msg}</div>`;
        });
    </script>
</body>
</html>
