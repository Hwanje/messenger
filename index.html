<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaultChat E2EE + File</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; }
        .hidden { display: none !important; }
        input { background: #2b2b2b; color: white; border: 1px solid #444; padding: 12px; width: calc(100% - 26px); margin-bottom: 10px; border-radius: 6px; }
        button { padding: 12px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; }
        .btn-primary { background: #007aff; color: white; width: 100%; }
        #chat-box { height: 450px; border: 1px solid #333; overflow-y: auto; background: #1e1e1e; padding: 15px; margin-bottom: 10px; border-radius: 10px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .timer { color: #ff3b30; font-weight: bold; font-size: 0.8em; }
        .file-preview { max-width: 200px; border-radius: 8px; margin-top: 5px; cursor: pointer; }
        .file-link { color: #34c759; text-decoration: underline; font-size: 0.9em; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div id="auth-section">
            <h2>🔐 VaultChat</h2>
            <input type="text" id="room-name" placeholder="방 이름 입력">
            <button class="btn-primary" onclick="createRoom()">새 방 만들기</button>
            <div id="otp-area" class="hidden" style="text-align:center; margin:15px; border: 1px dashed #555; padding: 15px;">
                <span id="otp-display" style="color:#007aff; font-size:1.5em; font-weight:bold;"></span>
                <p id="auth-timer" class="timer"></p>
            </div>
            <hr style="border:0.5px solid #333; margin:20px 0;">
            <input type="text" id="otp-input" placeholder="초대코드 6자리">
            <button class="btn-primary" style="background:#34c759;" onclick="joinRoom()">방 입장하기</button>
        </div>

        <div id="nickname-section" class="hidden">
            <h3>사용할 닉네임</h3>
            <input type="text" id="user-nickname" placeholder="닉네임 입력">
            <button class="btn-primary" onclick="setNickname()">대화 시작</button>
        </div>

        <div id="chat-section" class="hidden">
            <div class="header">
                <div>
                    <span id="current-room-title" style="font-weight:bold;"></span>
                    <span id="chat-otp-display" style="color:#007aff; margin-left:10px;"></span>
                    <span id="chat-timer" class="timer"></span>
                </div>
                <div>
                    <button style="background:#444; color:white; font-size:0.7em;" onclick="refreshOTP()">갱신</button>
                    <button style="background:#ff3b30; color:white; font-size:0.7em;" onclick="leaveRoom()">나가기</button>
                </div>
            </div>
            <div id="chat-box"></div>
            <div style="display:flex; gap:5px; align-items: center;">
                <input type="file" id="file-input" class="hidden" onchange="sendFile()">
                <button style="background:#444; color:white; width:45px;" onclick="document.getElementById('file-input').click()">📎</button>
                <input type="text" id="msg-input" placeholder="메시지 입력..." style="margin-bottom:0; flex:1;">
                <button class="btn-primary" style="width:70px;" onclick="sendMessage()">전송</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io("https://massenger-9oh6.onrender.com");
        const E2EE_KEY = CryptoJS.enc.Utf8.parse('1234567890123456');
        const E2EE_IV = CryptoJS.enc.Utf8.parse('1234567890123456');
        
        let currentRoom = "";
        let timer = null;
        let lastRefreshTime = 0;

        function startTimer() {
            let timeLeft = 60;
            if(timer) clearInterval(timer);
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('auth-timer').innerText = `${timeLeft}초 후 자동 갱신`;
                document.getElementById('chat-timer').innerText = `(${timeLeft}s)`;
                if(timeLeft <= 0) {
                    clearInterval(timer);
                    if(currentRoom) socket.emit('refresh_otp', {room: currentRoom});
                }
            }, 1000);
        }

        socket.on('display_otp', (data) => {
            document.getElementById('otp-area').classList.remove('hidden');
            document.getElementById('otp-display').innerText = data.code;
            document.getElementById('chat-otp-display').innerText = `CODE: ${data.code}`;
            startTimer();
        });

        function createRoom() {
            const room = document.getElementById('room-name').value;
            if(room) socket.emit('create_room', {room: room});
        }

        socket.on('create_success', (data) => {
            alert(`'${data.room}' 방이 생성되었습니다. OTP를 입력해 입장하세요.`);
        });

        function joinRoom() {
            const room = document.getElementById('room-name').value;
            const code = document.getElementById('otp-input').value;
            if(room && code) socket.emit('join_with_otp', {room: room, code: code});
        }

        socket.on('join_success', (data) => {
            currentRoom = data.room;
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('nickname-section').classList.remove('hidden');
        });

        function setNickname() {
            const nick = document.getElementById('user-nickname').value;
            if(!nick) return alert("닉네임 입력!");
            socket.emit('set_nickname', {nickname: nick, room: currentRoom});
            document.getElementById('nickname-section').classList.add('hidden');
            document.getElementById('chat-section').classList.remove('hidden');
            document.getElementById('current-room-title').innerText = currentRoom;
        }

        // 텍스트 전송
        function sendMessage() {
            const input = document.getElementById('msg-input');
            if(!input.value || !currentRoom) return;
            const encrypted = CryptoJS.AES.encrypt(input.value, E2EE_KEY, { iv: E2EE_IV }).toString();
            socket.emit('send_secure_msg', {room: currentRoom, msg: encrypted, type: 'text'});
            input.value = ""; 
        }

        // 파일 전송 함수 추가
        function sendFile() {
            const fileInput = document.getElementById('file-input');
            const file = fileInput.files[0];
            if (!file) return;

            // 용량 제한 (예: 5MB)
            if (file.size > 5 * 1024 * 1024) return alert("파일이 너무 큽니다. (5MB 제한)");

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Data = e.target.result;
                // 파일 데이터 암호화 (보안상 권장)
                const encryptedFile = CryptoJS.AES.encrypt(base64Data, E2EE_KEY, { iv: E2EE_IV }).toString();
                socket.emit('send_secure_msg', {
                    room: currentRoom, 
                    msg: encryptedFile, 
                    type: 'file', 
                    fileName: file.name,
                    fileType: file.type 
                });
            };
            reader.readAsDataURL(file);
            fileInput.value = ""; // 초기화
        }

        socket.on('receive_secure_msg', (data) => {
            const decrypted = CryptoJS.AES.decrypt(data.msg, E2EE_KEY, { iv: E2EE_IV }).toString(CryptoJS.enc.Utf8);
            const myNick = document.getElementById('user-nickname').value;
            const name = (data.sender === myNick) ? `나(${data.sender})` : data.sender;
            
            if (data.type === 'file') {
                addFileMsg(name, decrypted, data.fileName, data.fileType);
            } else {
                addMsg(name, decrypted);
            }
        });

        function addMsg(s, t) {
            const box = document.getElementById('chat-box');
            box.innerHTML += `<div style="margin-bottom:8px;"><strong>${s}:</strong> ${t}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        // 파일 메시지 출력 함수 추가
        function addFileMsg(s, data, fileName, fileType) {
            const box = document.getElementById('chat-box');
            let content = "";
            if (fileType.startsWith('image/')) {
                content = `<img src="${data}" class="file-preview" onclick="window.open('${data}')">`;
            } else {
                content = `<div class="file-link" onclick="downloadFile('${data}', '${fileName}')">📎 ${fileName} (다운로드)</div>`;
            }
            box.innerHTML += `<div style="margin-bottom:12px;"><strong>${s}:</strong><br>${content}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        function downloadFile(data, fileName) {
            const link = document.createElement('a');
            link.href = data;
            link.download = fileName;
            link.click();
        }

        function refreshOTP() {
            const now = Date.now();
            if (now - lastRefreshTime < 30000) return alert("잠시 후 다시 시도하세요.");
            const room = currentRoom || document.getElementById('room-name').value;
            if(room) {
                socket.emit('refresh_otp', {room: room});
                lastRefreshTime = now;
            }
        }

        function leaveRoom() { if(confirm("퇴장하시겠습니까?")) location.reload(); }
        socket.on('notification', (data) => {
            document.getElementById('chat-box').innerHTML += `<div style="text-align:center;color:gray;font-size:0.8em;margin:5px 0;">${data.msg}</div>`;
        });
        socket.on('join_fail', (data) => alert(data.msg));
    </script>
</body>
</html>
